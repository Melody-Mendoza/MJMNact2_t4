<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Libro Registrado</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #EAF6FF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor {
            width: 550px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .12);
        }

        h1 {
            text-align: center;
            color: #5B4B8A;
            margin-bottom: 25px;
            font-size: 32px;
        }

        p {
            font-size: 18px;
            margin: 15px 0;
            padding: 10px;
            background: #FFFDF5;
            border-radius: 10px;
            color: #555;
        }

        strong {
            color: #FF8FAB;
        }

        a {
            display: block;
            width: 220px;
            margin: 30px auto 0;
            text-align: center;
            text-decoration: none;
            background: #A8D8B9;
            color: #4A4A4A;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: .3s;
        }

        a:hover {
            background: #8FD3A8;
        }
    </style>

</head>

<body>

    <div class="contenedor">

        <h1>Libro Registrado</h1>

        <p><strong>Título:</strong> <span th:text="${libro.titulo}"></span></p>
        <p><strong>Autor:</strong> <span th:text="${libro.autor}"></span></p>
        <p><strong>Género:</strong> <span th:text="${libro.genero}"></span></p>
        <p><strong>Año:</strong> <span th:text="${libro.anioPublicacion}"></span></p>
        <a th:href="@{/formulario}">Registrar otro libro</a>

    </div>

</body>

</html>
