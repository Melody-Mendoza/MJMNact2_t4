<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Catálogo de Libros Infantiles</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #EAF6FF;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #5B4B8A;
            margin-bottom: 25px;
            font-size: 34px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
            background: white;
            box-shadow: 0 6px 15px rgba(0, 0, 0, .12);
        }

        th {
            background: #FFD6E8;
            color: #4A4A4A;
            padding: 14px;
            font-size: 17px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #EEEEEE;
        }

        tr:nth-child(odd) {
            background: #FFFDF5;
        }

        tr:nth-child(even) {
            background: #F4ECFF;
        }

        tr:hover {
            background: #DFF5E3;
            transition: .3s;
        }
    </style>

</head>

<body>
    <h1>Catálogo de Libros Infantiles</h1>
    <table>
        <thead>
            <tr>

                <th>ID</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Género</th>
                <th>Año</th>

            </tr>
        </thead>

        <tbody>
            <tr th:each="libro : ${libros}">

                <td th:text="${libro.id}"></td>
                <td th:text="${libro.titulo}"></td>
                <td th:text="${libro.autor}"></td>
                <td th:text="${libro.genero}"></td>
                <td th:text="${libro.anioPublicacion}"></td>

            </tr>
        </tbody>
    </table>
</body>

</html>
