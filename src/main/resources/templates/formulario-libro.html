<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registrar Libro</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #EAF6FF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor {
            width: 450px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .12);
        }

        h1 {
            text-align: center;
            color: #5B4B8A;
            margin-bottom: 25px;
            font-size: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            color: #555;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 2px solid #CDE7FF;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            transition: .3s;
        }

        input:focus {
            border-color: #FFB6D9;
            box-shadow: 0 0 8px rgba(255, 182, 217, .4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #A8D8B9;
            color: #4A4A4A;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #8FD3A8;
        }
    </style>

</head>

<body>

    <h1>Registrar Libro</h1>

    <form th:action="@{/guardarLibro}" th:object="${libro}" method="post">
        <input type="text" th:field="*{titulo}" placeholder="Título">
        <input type="text" th:field="*{autor}" placeholder="Autor">
        <input type="text" th:field="*{genero}" placeholder="Género">
        <input type="number" th:field="*{anioPublicacion}" placeholder="Año">
        <button type="submit">Guardar Libro</button>

    </form>

</body>

</html>
